set -g escape-time 0
set -g focus-events 1
set -g renumber-windows 1
set -ga terminal-features ",xterm-kitty:usstyle,xterm-kitty:RGB" #  truecolors and colored underline
set -g default-shell "/bin/zsh"

# remove the zero index window
set -g base-index 1

### KEYBINDS ###
# prefix remap from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

#reload conf
bind r source-file ~/.tmux.conf

# split panes using i and -
bind i split-window -h
bind - split-window -v
unbind '"'
unbind %

#bind -n M-Enter new-window -c "#{pane_current_path}"
bind -n M-Enter display-menu \
  "New window"          n "new-window -c '#{pane_current_path}'" \
  "Split horizontally"  i "split-window -h -c '#{pane_current_path}'" \
  "Split vertically"    - "split-window -v -c '#{pane_current_path}'"

bind -n M-q kill-pane
bind -n M-Q display-menu \
  "Detach"       d "detach" \
  "Kill pane"    p "kill-pane" \
  "Kill window"  w "kill-window" \
  "Kill session" s "kill-session" \
  "Kill server"  e "kill-server"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch window using Alt-[0-9] without prefix
bind -n M-0 select-window -t :=0
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# === DESIGN (Catppuccin Mocha — no plugins) ===

# palette
# base:    #1e1e2e  mantle:  #181825  crust:   #11111b
# surface0:#313244  overlay0:#6c7086  subtext1:#bac2de
# text:    #cdd6f4  blue:    #89b4fa  mauve:   #cba6f7
# green:   #a6e3a1  yellow:  #f9e2af  red:     #f38ba8

# bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock
setw -g clock-mode-colour '#89b4fa'

# copy mode
setw -g mode-style 'fg=#1e1e2e bg=#cba6f7 bold'

### PANES ###
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'
set -g pane-base-index 1
set -g pane-border-format "#{?pane_active,\
╡#[fg=#3c3836 bg=#fe8019]  #{pane_index}-#{pane_current_command}  #[fg=#fe8019 bg=default]╞,\
╡#[fg=#fe8019 bg=default]  #{pane_index}-#{pane_current_command}  #[fg=#fe8019]╞}"
set -g pane-border-lines double
set -g pane-border-status 'top'

# status bar
set -g status-position top
set -g status-justify left
set -g status-style 'bg=#1e1e2e fg=#6c7086'
set -g status-interval 1

# left: session pill with powerline arrow
set -g status-left '#[fg=#11111b,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#1e1e2e,none]  '
set -g status-left-length 40

# right: date / time / host with powerline arrow
set -g status-right '#[fg=#313244,bg=#1e1e2e]#[fg=#bac2de,bg=#313244]  %Y-%m-%d   %H:%M #[fg=#89b4fa,bg=#313244,bold] #h '
set -g status-right-length 60

# windows — no gap between entries
setw -g window-status-separator ''
setw -g window-status-style 'fg=#6c7086 bg=#1e1e2e'
setw -g window-status-format '  #[fg=#6c7086]#I #[fg=#a6adc8]#W  '

setw -g window-status-current-style 'fg=#11111b bg=#89b4fa bold'
setw -g window-status-current-format '#[fg=#89b4fa,bg=#1e1e2e]#[fg=#11111b,bg=#89b4fa,bold] #I #W #[fg=#89b4fa,bg=#1e1e2e,none]'

setw -g window-status-bell-style 'fg=#f38ba8 bg=#1e1e2e bold'

# messages
set -g message-style 'fg=#f9e2af bg=#313244 bold'
set -g message-command-style 'fg=#89b4fa bg=#313244'
